{% set name = "stone" %}
{% set version = "3.5.2" %}
{% set python_min = "3.11" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/dropbox/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: 0bf6e5ed8739350da7e82cb003cad9b9fa6febe3a5850265514f1cd98711aaf3

build:
  number: 0
  noarch: python
  entry_points:
    - stone=stone.cli:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - setuptools
    - python {{ python_min }}
  run:
    - jinja2 >=3.0.3
    - packaging >=21.0
    - ply >=3.4
    - python >={{ python_min }}

test:
  imports:
    - stone
  commands:
    - pip check
    - stone --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://www.dropbox.com/developers
  summary: Stone is an interface description language (IDL) for APIs.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/dropbox/stone
  doc_url: https://github.com/dropbox/stone/tree/main/docs

extra:
  recipe-maintainers:
    - cjmartian
    - BastianZim
